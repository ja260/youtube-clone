<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>YouTube Clone</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<header class="topbar">
  <div class="left">
    <button class="btn">☰</button>
    <div class="logo">YouTube</div>
  </div>

  <div class="center">
    <input class="search" placeholder="Search"/>
    <button class="btn">🔍</button>
    <button class="btn">🎤</button>
  </div>

  <div class="right">
    <button class="btn">＋</button>
    <button class="btn">🔔</button>
    <div class="avatar">N</div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <a class="side active" href="#">🏠 Home</a>
    <a class="side" href="#">🎬 Shorts</a>
    <a class="side" href="#">📺 Subscriptions</a>
    <a class="side" href="#">📚 Library</a>
  </aside>

  <main class="content">
    <div class="player">
      <iframe
        th:src="${current.embedUrl}" frameborder="0" allowfullscreen>
      </iframe>
    </div>

    <div style="margin-top:10px;">
    <a th:href="${current.watchUrl}" target="_blank"
       style="background:#cc0000;color:white;padding:8px 14px;
              border-radius:20px;text-decoration:none;font-weight:bold;">
        ▶ Open on YouTube
    </a>
</div>
   
<h1 class="title">Now Playing</h1>

    <div class="rightcol">
  <a class="rec" th:each="vid, st : ${videos}" th:href="@{/(v=${st.index})}">
    <div class="rec-title" th:text="${vid.title}">Title</div>
    <div class="rec-sub" th:text="${vid.channel + ' • ' + vid.views}">meta</div>
  </a>
</div>
  </main>
</div>

<script src="/js/app.js"></script>
</body>
</html>
